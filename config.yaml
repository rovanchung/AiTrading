trading:
  buy_threshold: 60
  profit_take_pct: 0.01        # +1% from Alpaca avg cost -> sell
  loss_cut_pct: 0.005           # -0.5% from Alpaca avg cost -> sell
  purchase_power_pct: 0.50      # 50% of portfolio value for redistribution
  cooldown_hours: 2             # hours before re-buying a profit/loss sold ticker
  paper_trading: true
  # deprecated — no longer used by the unified cycle:
  # max_positions: 15
  # max_position_pct: 0.06
  # cash_reserve_pct: 0.10
  # risk_per_trade_pct: 0.02
  # stop_loss_pct: 0.05
  # trailing_stop_pct: 0.05
  # take_profit_pct: 0.15
  # max_sector_pct: 0.30
  # drawdown_reduce_pct: 0.10
  # drawdown_liquidate_pct: 0.15

scoring:
  technical_weight: 0.35
  fundamental_weight: 0.25
  momentum_weight: 0.25
  sentiment_weight: 0.15

screener:
  min_price: 5.0
  max_price: 500.0
  min_avg_volume: 500000
  min_market_cap: 2000000000
  universe: "sp500"
  custom_tickers: []

schedule:
  market_open: "09:30"
  market_close: "16:00"
  prep_minutes_before_open: 5
  scan_interval_minutes: 60
  rerank_interval_minutes: 1
  shortlist_size: 80

fundamentals:
  staleness_days: 80          # skip API call if data is < 80 days old

data:
  primary: "alpaca"
  history_period: "3mo"
  universe_refresh_days: 7

macro:
  enabled: true
  cache_ttl_hours: 4

logging:
  level: "INFO"
  file: "data/logs/main.log"
  max_size_mb: 50
  backup_count: 5

database:
  path: "data/trading.db"
