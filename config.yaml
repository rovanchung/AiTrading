trading:
  strategy_version: "v2"        # "v1" = original, "v2" = anti-churn improvements
  buy_threshold: 60
  profit_take_pct: 0.01        # v1: +1% from Alpaca avg cost -> sell
  loss_cut_pct: 0.005           # v1: -0.5% from Alpaca avg cost -> sell
  purchase_power_pct: 0.50      # 50% of portfolio value for redistribution
  cooldown_hours: 2             # hours before re-buying a profit/loss sold ticker
  paper_trading: true
  # v2 strategy parameters (ignored when strategy_version = v1):
  v2_profit_take_pct: 0.03      # +3% from Alpaca avg cost -> sell
  v2_loss_cut_pct: 0.02         # -2% from Alpaca avg cost -> sell
  v2_min_hold_minutes: 30       # don't sell until held for this long
  v2_sell_threshold: 55         # score must drop below this to trigger no_longer_qualifies
  v2_rebalance_dead_band_pct: 0.03  # skip redistribution trades unless allocation off by >3%

scoring:
  technical_weight: 0.35
  fundamental_weight: 0.25
  momentum_weight: 0.25
  sentiment_weight: 0.15

screener:
  min_price: 5.0
  max_price: 500.0
  min_avg_volume: 500000
  min_market_cap: 2000000000
  universe: "sp500"
  custom_tickers: []

schedule:
  market_open: "09:30"
  market_close: "16:00"
  prep_minutes_before_open: 5
  scan_interval_minutes: 60
  rerank_interval_minutes: 1
  shortlist_size: 80

fundamentals:
  staleness_days: 80          # skip API call if data is < 80 days old

data:
  primary: "alpaca"
  history_period: "3mo"
  universe_refresh_days: 7

macro:
  enabled: true
  cache_ttl_hours: 4

logging:
  level: "INFO"
  file: "data/logs/main.log"
  max_size_mb: 50
  backup_count: 5

database:
  path: "data/trading.db"

accounts:
  v1:
    database_path: "data/trading_v1.db"
    strategy_version: "v1"
    # Uses ALPACA_API_KEY / ALPACA_SECRET_KEY from .env
  v2:
    database_path: "data/trading_v2.db"
    strategy_version: "v2"
    # Uses ALPACA_API_KEY_V2 / ALPACA_SECRET_KEY_V2 from .env
